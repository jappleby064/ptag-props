<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People's Theatre — Props &amp; Costume Inventory</title>
  <link rel="stylesheet" href="public/css/styles.css">

  <style>
    .server-badge { display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:12px;border:1px solid var(--border);color:var(--text-dim);white-space:nowrap; }
    .server-badge.connected { border-color:#1e8449;color:#1e8449;background:rgba(30,132,73,.08); }
    .server-status-dot { display:inline-block;width:7px;height:7px;border-radius:50%;background:currentColor; }
  </style>
</head>
<body>

<header class="header">
  <a class="header-brand" href="index.html">
    <img src="public/images/logo.jpg" alt="People's Theatre" class="header-logo-img" onerror="this.style.display='none'">
    <div class="header-logo-text">
      <div class="name">People's Theatre</div>
      <div class="sub">Props &amp; Costume Inventory</div>
    </div>
  </a>
  <div class="header-spacer"></div>
  <div class="header-actions" id="header-actions"></div>
</header>

<main class="main">
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="search-input" placeholder="Search by name, ID, location…">
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" data-type="all">All</button>
      <button class="filter-tab" data-type="prop">🎭 Props</button>
      <button class="filter-tab" data-type="furniture">🪑 Furniture</button>
      <button class="filter-tab" data-type="costume">👗 Costumes</button>
    </div>
    <span class="result-count" id="result-count"></span>
  </div>
  <div class="grid" id="item-grid">
    <div class="loading-state"><div class="spinner"></div> Loading inventory…</div>
  </div>
</main>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const WORKER    = 'https://ptag-props.jappleby064.workers.dev';
const TYPE_ICONS = { prop:'🎭', furniture:'🪑', costume:'👗' };
window.APP_STATE = { categories:{ prop:[], furniture:[], costume:[] }, storageAreas:[] };

let _db     = null;
let _filter = { type:'all', search:'' };
let _dbt;

// ─── Auth ─────────────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('ptag_token'); }
function isAdmin()  { return !!getToken(); }

// ─── Utilities ────────────────────────────────────────────────────────────────
function escHtml(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escId(s)  { return String(s).replace(/[^a-zA-Z0-9]/g,'_'); }
function fmtDate(i){ return i?new Date(i).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—'; }
function imageUrl(f){ return f?`uploads/${f}`:null; }
function primaryImage(imgs){ if(!imgs?.length)return null; return imgs.find(i=>i.is_primary)||imgs[0]; }
function typeChip(t){ const l={prop:'Prop',furniture:'Furniture',costume:'Costume'}; return `<span class="chip chip-${t}">${l[t]||t}</span>`; }
function categoryChip(c){ return `<span class="chip chip-category">${escHtml(c)}</span>`; }
function closeModal(id){ document.getElementById(id)?.remove(); }

function toast(msg,isError=false){
  let c=document.getElementById('toast-container');
  if(!c){c=document.createElement('div');c.id='toast-container';c.className='toast-container';document.body.appendChild(c);}
  const el=document.createElement('div');el.className=`toast${isError?' error':''}`;el.textContent=msg;
  c.appendChild(el);setTimeout(()=>el.remove(),4000);
}

function buildCategoryOptions(type,sel=''){
  const cats=APP_STATE.categories[type]||[];
  if(!cats.length)return`<option value="">No categories — add in Settings</option>`;
  return cats.map(c=>`<option value="${escHtml(c)}"${c===sel?' selected':''}>${escHtml(c)}</option>`).join('');
}
function buildStorageOptions(sel=''){
  return`<option value="">— select —</option>`+(APP_STATE.storageAreas||[]).map(a=>`<option value="${escHtml(a)}"${a===sel?' selected':''}>${escHtml(a)}</option>`).join('');
}

// ─── Worker API client ────────────────────────────────────────────────────────
async function workerFetch(path, options={}){
  const headers={'Content-Type':'application/json',...(options.headers||{})};
  const token=getToken();
  if(token) headers['Authorization']=`Bearer ${token}`;
  const res=await fetch(`${WORKER}${path}`,{...options,headers});
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||`HTTP ${res.status}`);
  return data;
}

function b64(str){ return btoa(unescape(encodeURIComponent(str))); }

async function getFileSha(filePath){
  const data=await workerFetch(`/api/files/${filePath}`);
  return data.sha;
}

async function pushDb(db, message){
  const sha=await getFileSha('inventory.json');
  await workerFetch('/api/files/inventory.json',{
    method:'PUT',
    body:JSON.stringify({message:message||`Inventory update ${new Date().toISOString().slice(0,16)}`,content:b64(JSON.stringify(db,null,2)),sha})
  });
  _db=db;
}

async function uploadImageFile(file){
  const blob=await compressImage(file);
  const b64content=await blobToBase64(blob);
  const filename=`${Date.now()}-${Math.random().toString(36).slice(2)}.jpg`;
  await workerFetch(`/api/files/uploads/${filename}`,{
    method:'PUT',
    body:JSON.stringify({message:`Add image ${filename}`,content:b64content})
  });
  return filename;
}

async function deleteImageFile(filename){
  try{
    const sha=await getFileSha(`uploads/${filename}`);
    await workerFetch(`/api/files/uploads/${filename}`,{
      method:'DELETE',
      body:JSON.stringify({message:`Remove image ${filename}`,sha})
    });
  }catch(e){ console.warn('Could not delete image file:',e.message); }
}

// Client-side image resize → base64 JPEG
function compressImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=1200;
        let {width:w,height:h}=img;
        if(w>MAX||h>MAX){ const r=Math.min(MAX/w,MAX/h); w=Math.round(w*r); h=Math.round(h*r); }
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(resolve,'image/jpeg',0.85);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function blobToBase64(blob){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>resolve(e.target.result.split(',')[1]);
    reader.readAsDataURL(blob);
  });
}

// ─── Inventory data ───────────────────────────────────────────────────────────
async function loadDb(force=false){
  if(_db&&!force) return _db;
  const r=await fetch(`inventory.json?_=${Date.now()}`);
  if(!r.ok) throw new Error('Could not load inventory.json');
  _db=await r.json();
  APP_STATE.categories   = _db.categories   || { prop:[], furniture:[], costume:[] };
  APP_STATE.storageAreas = _db.storage_areas || [];
  return _db;
}

function joinedItems(db){
  return db.items.map(item=>{
    const images=(db.images||[]).filter(img=>img.item_id===item.id).sort((a,b)=>b.is_primary-a.is_primary||a.id-b.id);
    const open=(db.reports||[]).filter(r=>r.item_id===item.id&&!r.resolved);
    return{...item,images,flags:{missing:open.some(r=>r.type==='missing'),broken:open.some(r=>r.type==='broken')}};
  }).sort((a,b)=>a.type.localeCompare(b.type)||a.asset_id.localeCompare(b.asset_id));
}

function getItemFromCache(id){
  if(!_db) return null;
  const item=_db.items.find(i=>i.id===Number(id));
  if(!item) return null;
  const images=(_db.images||[]).filter(img=>img.item_id===item.id).sort((a,b)=>b.is_primary-a.is_primary||a.id-b.id);
  const open=(_db.reports||[]).filter(r=>r.item_id===item.id&&!r.resolved);
  return{...item,images,flags:{missing:open.some(r=>r.type==='missing'),broken:open.some(r=>r.type==='broken')}};
}

function suggestIdLocal(type){
  if(!_db) return '';
  const p={prop:'P',furniture:'F',costume:'C'};
  return`${p[type]}-${String((_db.counters[type]||0)+1).padStart(3,'0')}`;
}

// ─── Header ───────────────────────────────────────────────────────────────────
async function setupHeader(){
  const slot=document.getElementById('header-actions');
  if(isAdmin()){
    const user=localStorage.getItem('ptag_user')||'Admin';
    slot.innerHTML=`
      <span class="server-badge connected"><span class="server-status-dot"></span>Admin</span>
      <button class="btn btn-outline btn-sm" onclick="openAddModal()">+ Add Item</button>
      <button class="btn btn-outline btn-sm" id="dashboard-btn" onclick="openDashboard()">📋 Dashboard <span id="report-badge" class="report-badge hidden">0</span></button>
      <button class="btn btn-outline btn-sm" onclick="openSettings()">⚙️ Settings</button>
      <span class="header-user">👤 ${escHtml(user)}</span>
      <button class="btn btn-outline btn-sm" onclick="doLogout()">Sign out</button>`;
    refreshReportBadge();
  } else {
    slot.innerHTML=`<button class="btn btn-copper btn-sm" onclick="openLoginModal()">Admin Login</button>`;
  }
}

function doLogout(){
  localStorage.removeItem('ptag_token');
  localStorage.removeItem('ptag_user');
  setupHeader(); loadItems();
}

function refreshReportBadge(){
  if(!_db) return;
  const count=(_db.reports||[]).filter(r=>!r.resolved).length;
  const badge=document.getElementById('report-badge');
  if(!badge) return;
  if(count>0){badge.textContent=count;badge.classList.remove('hidden');}
  else badge.classList.add('hidden');
}

// ─── Login (username + password) ─────────────────────────────────────────────
function openLoginModal(){
  document.getElementById('login-modal-backdrop')?.remove();
  const el=document.createElement('div');el.id='login-modal-backdrop';el.className='modal-backdrop';
  el.innerHTML=`
    <div class="modal modal--narrow">
      <div class="modal-header">
        <div class="modal-title">Admin Login</div>
        <button class="modal-close" onclick="closeModal('login-modal-backdrop')">×</button>
      </div>
      <div class="modal-body">
        <form id="login-form" onsubmit="submitLogin(event)" class="login-form">
          <div class="login-error" id="login-error"></div>
          <div class="form-field">
            <label>Username</label>
            <input type="text" name="username" autocomplete="username" required>
          </div>
          <div class="form-field">
            <label>Password</label>
            <input type="password" name="password" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-copper btn-lg" id="login-btn" style="width:100%">Sign In</button>
        </form>
      </div>
    </div>`;
  document.body.appendChild(el);
  el.querySelector('input[name=username]').focus();
}

async function submitLogin(e){
  e.preventDefault();
  const form=e.target,btn=document.getElementById('login-btn'),err=document.getElementById('login-error');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Verifying…';
  err.classList.remove('show');err.textContent='';
  const username=form.elements.username.value.trim();
  const password=form.elements.password.value;
  try{
    const data=await workerFetch('/api/login',{method:'POST',body:JSON.stringify({username,password})});
    localStorage.setItem('ptag_token',data.token);
    localStorage.setItem('ptag_user',data.username);
    closeModal('login-modal-backdrop');
    setupHeader(); loadItems();
    toast(`Welcome, ${data.username}`);
  }catch(e2){
    err.textContent=e2.message;err.classList.add('show');
    btn.disabled=false;btn.innerHTML='Sign In';
  }
}

// ─── Filters + grid ──────────────────────────────────────────────────────────
function setupFilters(){
  document.querySelectorAll('.filter-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');_filter.type=tab.dataset.type;loadItems();
    });
  });
  document.getElementById('search-input').addEventListener('input',e=>{
    clearTimeout(_dbt);_dbt=setTimeout(()=>{_filter.search=e.target.value.trim();loadItems();},300);
  });
}

async function loadItems(){
  const grid=document.getElementById('item-grid');
  grid.innerHTML='<div class="loading-state"><div class="spinner"></div> Loading inventory…</div>';
  try{
    const db=await loadDb();
    let items=joinedItems(db);
    if(_filter.type!=='all') items=items.filter(i=>i.type===_filter.type);
    if(_filter.search){
      const q=_filter.search.toLowerCase();
      items=items.filter(i=>[i.name,i.asset_id,i.storage_area,i.item_category].some(v=>v&&v.toLowerCase().includes(q)));
    }
    document.getElementById('result-count').textContent=`${items.length} item${items.length!==1?'s':''}`;
    if(!items.length){grid.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><h3>No items found</h3><p>Try adjusting your search or filters.</p></div>`;return;}
    grid.innerHTML=items.map(i=>renderCard(i)).join('');
  }catch(err){grid.innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><h3>Failed to load</h3><p>${escHtml(err.message)}</p></div>`;}
}

// ─── Cards ────────────────────────────────────────────────────────────────────
function renderCard(item){
  const img=primaryImage(item.images),flags=item.flags||{};
  const flagHtml=(flags.missing||flags.broken)?`<div class="card-flag-badges">${flags.missing?'<span class="card-flag card-flag--missing">🔍 Missing</span>':''}${flags.broken?'<span class="card-flag card-flag--broken">🔧 Broken</span>':''}</div>`:'';
  const imgHtml=img
    ?`<div class="card-image" style="position:relative"><img src="${imageUrl(img.filename)}" alt="${escHtml(item.name)}" loading="lazy">${flagHtml}</div>`
    :`<div class="card-image card-image--empty" style="position:relative">${TYPE_ICONS[item.type]||'📦'}${flagHtml}</div>`;
  const adminActions=isAdmin()?`<div class="card-admin-actions" onclick="event.stopPropagation()"><button class="btn btn-outline btn-xs" onclick="openEditModal(${item.id})">✏️ Edit</button><button class="btn btn-danger btn-xs" onclick="confirmDelete(${item.id},'${escHtml(item.name)}')">🗑️</button></div>`:'';
  return`<div class="card" onclick="openDetailModal(${item.id})" data-id="${item.id}">${imgHtml}
    <div class="card-body">
      <div class="card-asset-id">${item.asset_id}</div>
      <div class="card-name">${escHtml(item.name)}</div>
      <div class="card-meta">${typeChip(item.type)} ${categoryChip(item.item_category)}</div>
      ${item.storage_area?`<div class="card-location">📍 ${escHtml(item.storage_area)}${item.storage_location?' · '+escHtml(item.storage_location):''}</div>`:''}
    </div>
    <div class="card-report-bar" onclick="event.stopPropagation()">
      <button class="btn-report" onclick="openReportModal(${item.id},'${escHtml(item.name)}','missing')">🔍 Report Missing</button>
      <button class="btn-report btn-report--broken" onclick="openReportModal(${item.id},'${escHtml(item.name)}','broken')">🔧 Report Broken</button>
    </div>${adminActions}</div>`;
}

// ─── Detail modal ─────────────────────────────────────────────────────────────
function openDetailModal(id){ const item=getItemFromCache(id); if(item) showDetailModal(item); }

function showDetailModal(item){
  document.getElementById('detail-modal-backdrop')?.remove();
  const galleryHtml=item.images?.length
    ?item.images.map((img,idx)=>`<div class="gallery-item${img.is_primary?' primary':''}">
        ${img.is_primary?'<div class="gallery-primary-badge">★ Primary</div>':''}
        <img src="${imageUrl(img.filename)}" alt="" onclick="openLightbox(${JSON.stringify(item.images).replace(/"/g,'&quot;')},${idx})">
        ${isAdmin()?`<div class="gallery-item-actions">
          ${!img.is_primary?`<button class="btn btn-sm btn-outline" onclick="setImgPrimary(${item.id},${img.id})">★</button>`:''}
          <button class="btn btn-sm btn-danger" onclick="removeImg(${item.id},${img.id},'${escHtml(img.filename)}')">🗑️</button>
        </div>`:''}
      </div>`).join('')
    :`<div class="no-image-placeholder"><span>📷</span>No images uploaded</div>`;

  const adminBtns=isAdmin()?`
    <button class="btn btn-copper" onclick="openEditModal(${item.id});closeModal('detail-modal-backdrop')">✏️ Edit</button>
    <button class="btn btn-danger"  onclick="confirmDelete(${item.id},'${escHtml(item.name)}');closeModal('detail-modal-backdrop')">🗑️ Delete</button>`:'';

  const el=document.createElement('div');el.id='detail-modal-backdrop';el.className='modal-backdrop';
  el.innerHTML=`<div class="modal">
    <div class="modal-header">
      <div><div class="modal-asset-id">${item.asset_id}</div><div class="modal-title">${escHtml(item.name)}</div></div>
      <div class="card-meta" style="flex:1;margin-left:12px">${typeChip(item.type)} ${categoryChip(item.item_category)}</div>
      <button class="modal-close" onclick="closeModal('detail-modal-backdrop')">×</button>
    </div>
    <div class="modal-body">
      <div class="gallery">${galleryHtml}</div>
      <div class="section-divider"></div>
      <div class="detail-grid">
        <div class="detail-field"><label>Storage Area</label><div class="value">${escHtml(item.storage_area)||'—'}</div></div>
        <div class="detail-field"><label>Storage Location</label><div class="value">${escHtml(item.storage_location)||'—'}</div></div>
        ${item.type==='costume'&&item.size?`<div class="detail-field"><label>Size</label><div class="value">${escHtml(item.size)}</div></div>`:''}
        ${item.type==='furniture'&&item.dimensions?`<div class="detail-field"><label>Dimensions</label><div class="value">${escHtml(item.dimensions)}</div></div>`:''}
        <div class="detail-field full"><label>Notes</label><div class="value" style="white-space:pre-wrap">${escHtml(item.notes)||'—'}</div></div>
      </div>
      <div class="form-actions" style="justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div style="display:flex;gap:8px">
          <button class="btn btn-report-detail" onclick="openReportModal(${item.id},'${escHtml(item.name)}','missing')">🔍 Report Missing</button>
          <button class="btn btn-report-detail btn-report-detail--broken" onclick="openReportModal(${item.id},'${escHtml(item.name)}','broken')">🔧 Report Broken</button>
        </div>
        ${isAdmin()?`<div style="display:flex;gap:8px">${adminBtns}</div>`:''}
      </div>
    </div>
  </div>`;
  document.body.appendChild(el);
}

// ─── Image admin ──────────────────────────────────────────────────────────────
async function setImgPrimary(itemId,imageId){
  const db=_db;
  db.images.filter(i=>i.item_id===itemId).forEach(i=>i.is_primary=0);
  const t=db.images.find(i=>i.id===imageId); if(t) t.is_primary=1;
  try{ await pushDb(db,'Update primary image'); showDetailModal(getItemFromCache(itemId)); toast('Primary image updated'); }
  catch(e){ toast(e.message,true); }
}

async function removeImg(itemId,imageId,filename){
  if(!confirm('Delete this image?')) return;
  const db=_db;
  db.images=db.images.filter(i=>i.id!==imageId);
  try{
    await pushDb(db,'Remove image reference');
    await deleteImageFile(filename);
    showDetailModal(getItemFromCache(itemId)); toast('Image removed');
  }catch(e){ toast(e.message,true); }
}

// ─── Add / Edit form ──────────────────────────────────────────────────────────
function openAddModal()    { showItemForm(null); }
function openEditModal(id) { const item=getItemFromCache(id); if(item) showItemForm(item); }

function showItemForm(item=null){
  document.getElementById('form-modal-backdrop')?.remove();
  const isEdit=!!item,defaultType=item?item.type:'prop';
  const el=document.createElement('div');el.id='form-modal-backdrop';el.className='modal-backdrop';
  el.innerHTML=`<div class="modal">
    <div class="modal-header">
      <div class="modal-title">${isEdit?`Edit: ${escHtml(item.name)}`:'Add New Item'}</div>
      <button class="modal-close" onclick="closeModal('form-modal-backdrop')">×</button>
    </div>
    <div class="modal-body">
      <form id="item-form" onsubmit="submitItemForm(event,${isEdit?item.id:'null'})">
        <div class="form-grid">
          <div class="form-field">
            <label>Type <span class="required">*</span></label>
            <select name="type" id="form-type" onchange="onTypeChange()" ${isEdit?'disabled':''} required>
              <option value="prop"      ${defaultType==='prop'?'selected':''}>Prop</option>
              <option value="furniture" ${defaultType==='furniture'?'selected':''}>Furniture</option>
              <option value="costume"   ${defaultType==='costume'?'selected':''}>Costume</option>
            </select>
          </div>
          <div class="form-field">
            <label>Category <span class="required">*</span></label>
            <select name="item_category" id="form-category" required>${buildCategoryOptions(defaultType,item?item.item_category:'')}</select>
          </div>
          <div class="form-field">
            <label>Asset ID${isEdit?'':' <span class="required">*</span>'}</label>
            <input type="text" name="asset_id" id="form-asset-id"
                   value="${isEdit?escHtml(item.asset_id):escHtml(suggestIdLocal(defaultType))}"
                   placeholder="e.g. P-001" ${isEdit?'disabled':'required'}
                   style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
            ${!isEdit?'<span class="hint">Suggested — change if needed</span>':''}
          </div>
          <div class="form-field">
            <label>Name <span class="required">*</span></label>
            <input type="text" name="name" value="${escHtml(item?item.name:'')}" placeholder="Item name" required>
          </div>
          <div class="form-field">
            <label>Storage Area</label>
            <select name="storage_area" id="form-storage-area">${buildStorageOptions(item?item.storage_area:'')}</select>
          </div>
          <div class="form-field">
            <label>Storage Location</label>
            <input type="text" name="storage_location" value="${escHtml(item?item.storage_location:'')}" placeholder="e.g. Shelf 3, Box 2">
          </div>
          <div class="form-field" id="size-field" style="${defaultType==='costume'?'':'display:none'}">
            <label>Size</label>
            <input type="text" name="size" value="${escHtml(item?item.size:'')}" placeholder="e.g. M, 10, 34W">
          </div>
          <div class="form-field" id="dimensions-field" style="${defaultType==='furniture'?'':'display:none'}">
            <label>Dimensions</label>
            <input type="text" name="dimensions" value="${escHtml(item?item.dimensions:'')}" placeholder="e.g. 120×60×75 cm">
          </div>
          <div class="form-field full">
            <label>Notes</label>
            <textarea name="notes" placeholder="Any additional notes…">${escHtml(item?item.notes:'')}</textarea>
          </div>
          <div class="form-field full">
            <label>Images${isEdit?' (add more)':''}</label>
            <div class="upload-zone" onclick="document.getElementById('file-input').click()"
                 ondragover="event.preventDefault();this.classList.add('drag')"
                 ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">
              <span class="upload-zone-icon">📷</span>

async function submitItemForm(e,editId){
  e.preventDefault();
  const form=e.target,btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Saving…';
  const db=JSON.parse(JSON.stringify(_db));
  const f=form.elements;
  const now=new Date().toISOString();
  try{
    // Upload images first
    let uploadedFilenames=[];
    if(form._files?.length){
      btn.innerHTML=`<span class="spinner"></span> Uploading ${form._files.length} image(s)…`;
      uploadedFilenames=await Promise.all(form._files.map(uploadImageFile));
    }

    if(!editId){
      // Create
      const type=f.type.value;
      const asset_id=f.asset_id.value.trim().toUpperCase();
      if(db.items.find(i=>i.asset_id===asset_id)) throw new Error(`Asset ID ${asset_id} already in use`);
      const prefixes={prop:'P',furniture:'F',costume:'C'};
      const match=asset_id.match(new RegExp(`^${prefixes[type]}-(\\d+)$`));
      if(match){ const n=parseInt(match[1],10); if(n>db.counters[type]) db.counters[type]=n; }
      const id=db.nextId.item++;
      db.items.push({ id,asset_id,type,item_category:f.item_category.value,name:f.name.value,
        storage_area:f.storage_area.value||null,storage_location:f.storage_location.value||null,
        size:type==='costume'?f.size.value||null:null,dimensions:type==='furniture'?f.dimensions.value||null:null,
        notes:f.notes.value||null,created_at:now,updated_at:now });
      uploadedFilenames.forEach((fn,idx)=>{
        db.images.push({id:db.nextId.image++,item_id:id,filename:fn,original_name:form._files[idx].name,is_primary:idx===0?1:0,created_at:now});
      });
      await pushDb(db,`Add item ${asset_id}: ${f.name.value}`);
      toast('Item added — GitHub Pages updates in ~1 minute');
    } else {
      // Edit
      const idx=db.items.findIndex(i=>i.id===Number(editId));
      if(idx===-1) throw new Error('Item not found');
      const ex=db.items[idx];
      db.items[idx]={ ...ex,item_category:f.item_category.value||ex.item_category,name:f.name.value||ex.name,
        storage_area:f.storage_area.value!==undefined?f.storage_area.value:ex.storage_area,
        storage_location:f.storage_location.value!==undefined?f.storage_location.value:ex.storage_location,
        size:ex.type==='costume'?f.size.value||ex.size:null,
        dimensions:ex.type==='furniture'?f.dimensions.value||ex.dimensions:null,
        notes:f.notes.value||null,updated_at:now };
      const hasImages=db.images.some(img=>img.item_id===ex.id);
      uploadedFilenames.forEach((fn,fileIdx)=>{
        db.images.push({id:db.nextId.image++,item_id:ex.id,filename:fn,original_name:form._files[fileIdx].name,is_primary:!hasImages&&fileIdx===0?1:0,created_at:now});
      });
      await pushDb(db,`Update item ${ex.asset_id}`);
      toast('Item updated — GitHub Pages updates in ~1 minute');
    }
    closeModal('form-modal-backdrop');
    loadItems();
  }catch(err){
    toast(err.message,true);btn.disabled=false;btn.innerHTML=editId?'💾 Save Changes':'➕ Add Item';
  }
}

// ─── Delete item ──────────────────────────────────────────────────────────────
function confirmDelete(id,name){
  if(!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  const db=JSON.parse(JSON.stringify(_db));
  const item=db.items.find(i=>i.id===Number(id));
  if(!item){ toast('Item not found',true); return; }
  const imgFilenames=(db.images||[]).filter(img=>img.item_id===Number(id)).map(img=>img.filename);
  db.items=db.items.filter(i=>i.id!==Number(id));
  db.images=db.images.filter(img=>img.item_id!==Number(id));
  pushDb(db,`Delete item ${item.asset_id}: ${item.name}`)
    .then(async ()=>{
      // Best-effort delete image files
      for(const fn of imgFilenames){ await deleteImageFile(fn); }
      toast(`"${name}" deleted — GitHub Pages updates in ~1 minute`);
      loadItems();
    })
    .catch(err=>toast(err.message,true));
}

function loadDashTab(status,tabEl){
  document.querySelectorAll('.dash-tab').forEach(t=>t.classList.remove('active'));
  if(tabEl) tabEl.classList.add('active');
  const content=document.getElementById('dash-content');
  if(!content) return;
  let reports=(_db?.reports||[]).slice();
  if(status==='open')     reports=reports.filter(r=>!r.resolved);
  else if(status==='resolved') reports=reports.filter(r=>r.resolved);
  reports.sort((a,b)=>new Date(b.reported_at)-new Date(a.reported_at));
  if(!reports.length){content.innerHTML=`<div class="empty" style="padding:40px 0"><div class="empty-icon">${status==='open'?'✅':'📭'}</div><h3>${status==='open'?'No open reports':'No reports yet'}</h3></div>`;return;}
  const open=reports.filter(r=>!r.resolved);
  const summary=status==='open'?`<div class="dash-summary">
    <div class="dash-summary-stat"><span class="dash-stat-num">${open.filter(r=>r.type==='missing').length}</span><span class="dash-stat-label">🔍 Missing</span></div>
    <div class="dash-summary-stat"><span class="dash-stat-num">${open.filter(r=>r.type==='broken').length}</span><span class="dash-stat-label">🔧 Broken</span></div>
  </div>`:'';
  content.innerHTML=summary+`<div class="report-list">${reports.map(r=>renderReport(r)).join('')}</div>`;
}

function renderReport(r){
  const badge=r.type==='missing'?`<span class="report-badge-type missing">🔍 Missing</span>`:`<span class="report-badge-type broken">🔧 Broken</span>`;
  const resolved=r.resolved?`<div class="report-resolved-info">✅ Resolved ${fmtDate(r.resolved_at)} by <strong>${escHtml(r.resolved_by)}</strong>${r.resolve_note?`<br><em>${escHtml(r.resolve_note)}</em>`:''}</div>`:'';
  const actions=!r.resolved?`<div class="report-actions"><button class="btn btn-sm btn-copper" onclick="doResolveReport(${r.id})">✅ Resolve</button><button class="btn btn-sm btn-danger" onclick="doDeleteReport(${r.id})">🗑️</button></div>`:`<div class="report-actions"><button class="btn btn-sm btn-outline" onclick="doDeleteReport(${r.id})">🗑️ Remove</button></div>`;
  return`<div class="report-card${r.resolved?' report-card--resolved':''}" id="report-${r.id}">
    <div class="report-card-header">${badge}<strong class="report-item-link" onclick="openDetailModal(${r.item_id})">${escHtml(r.item_asset_id)} — ${escHtml(r.item_name)}</strong><span class="report-date">${fmtDate(r.reported_at)}</span></div>
    ${r.note?`<div class="report-note">"${escHtml(r.note)}"</div>`:''}${resolved}${actions}</div>`;
}

async function doResolveReport(id){
  const note=prompt('Resolution note (optional):')||null;
  const db=JSON.parse(JSON.stringify(_db));
  const r=db.reports.find(x=>x.id===id);
  if(!r){ toast('Report not found',true); return; }
  r.resolved=true; r.resolved_at=new Date().toISOString(); r.resolved_by=localStorage.getItem('ptag_user')||'Admin'; r.resolve_note=note;
  try{ await pushDb(db,`Resolve report #${id}`); toast('Report marked resolved'); const at=document.querySelector('.dash-tab.active'); loadDashTab(at?.textContent.trim().toLowerCase()||'open',at); refreshReportBadge(); }
  catch(e){ toast(e.message,true); }
}

async function doDeleteReport(id){
  if(!confirm('Delete this report permanently?')) return;
  const db=JSON.parse(JSON.stringify(_db));
  db.reports=db.reports.filter(r=>r.id!==id);
  try{ await pushDb(db,`Delete report #${id}`); document.getElementById(`report-${id}`)?.remove(); refreshReportBadge(); toast('Report deleted'); }
  catch(e){ toast(e.message,true); }
}
